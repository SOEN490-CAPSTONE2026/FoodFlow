admin.alert.template.safety=Caro usuario,\n\nObserve as seguintes diretrizes de seguranca ao lidar com doacoes de alimentos:\n\n- Manter temperaturas adequadas de armazenamento\n- Verificar datas de validade regularmente\n- Seguir protocolos de higiene\n\nSua seguranca e a dos beneficiarios e nossa prioridade.
admin.alert.template.compliance=Caro usuario,\n\nEste e um lembrete amigavel para garantir que sua conta atenda todos os requisitos de conformidade:\n\n\u2713 Informacoes de perfil completas\n\u2713 Documentacao atualizada\n\u2713 Adesao as politicas da plataforma\n\nRevise as configuracoes da sua conta e atualize qualquer informacao ausente.\n\nObrigado por manter a conformidade.

