# Use H2 dialect for tests, not PostgreSQL
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
junit.jupiter.execution.parallel.enabled=false

# Disable PostgreSQL-specific features
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop

# DISABLE FLYWAY FOR TESTS - PostgreSQL migrations won't work on H2
spring.flyway.enabled=false

# Other test settings
server.port=0
jwt.secret=testSecretKeyThatIsAtLeast32CharactersLongForTesting
jwt.expiration=86400000
spring.jmx.enabled=false

# CORS config for tests
spring.web.cors.allowed-origins=http://localhost:3000,http://localhost:3001

# Brevo Email Configuration (mock values for testing)
brevo.api.key=test-api-key
brevo.from.email=test@foodflow.com
brevo.from.name=FoodFlow Test

# Frontend URL for email links
frontend.url=http://localhost:3000

# OpenAI configuration for tests (avoid unresolved placeholders)
app.openai.api-key=test-openai-key

# Twilio SMS Configuration (mock values for testing)
twilio.account.sid=test-account-sid
twilio.auth.token=test-auth-token
twilio.phone.number=+15555555555

# Calendar Integration Configuration
calendar.encryption.key=${CALENDAR_ENCRYPTION_KEY:test-encryption-key-32chars!!}
google.calendar.client-id=${GOOGLE_CALENDAR_CLIENT_ID:test-client-id}
google.calendar.client-secret=${GOOGLE_CALENDAR_CLIENT_SECRET:test-client-secret}
google.calendar.redirect-uri=${GOOGLE_CALENDAR_REDIRECT_URI:http://localhost:8080/api/calendar/oauth2/callback}
google.calendar.scopes=https://www.googleapis.com/auth/calendar
calendar.sync.enabled=true
calendar.sync.batch-size=10
calendar.sync.retry-attempts=3
calendar.sync.retry-delay-ms=1000

# Stripe Payment Configuration (mock values for testing)
stripe.api.key=test-stripe-api-key
stripe.webhook.secret=test-webhook-secret
stripe.currency.default=USD
stripe.retry.max-attempts=3
stripe.retry.initial-delay-ms=1000

# OpenAI model and settings
app.openai.model=gpt-4o-mini
app.openai.max-tokens=500
app.openai.temperature=0.3

# Support Configuration
app.support.email=test@foodflow.com
app.support.phone=+1-555-555-5555

# Rate Limiting Configuration (disabled for tests)
app.ratelimit.user.requests-per-minute=1000
app.ratelimit.ip.requests-per-minute=3000
app.ratelimit.openai.requests-per-minute=1000
app.ratelimit.burst-capacity=100
app.ratelimit.enabled=false

# Password Policy Configuration
password.policy.min-length=10
password.policy.require-uppercase=true
password.policy.require-lowercase=true
password.policy.require-digit=true
password.policy.require-special-char=true
password.policy.history-depth=3
password.policy.reset-token-expiry-minutes=15

# Audit logging
AUDIT_LOG_ENABLED=true

# Food Safety - Expiry Calculation
foodflow.expiry.default-days=7
foodflow.expiry.enable-auto-flagging=true
foodflow.expiring-soon-hours=24
foodflow.expiry.notification.threshold-hours=48,24

# File Upload Configuration
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=20MB
file.upload.dir=test-uploads
file.upload.base-url=/api/files

# Pickup Tolerance Configuration
pickup.tolerance.early-minutes=15
pickup.tolerance.late-minutes=15
