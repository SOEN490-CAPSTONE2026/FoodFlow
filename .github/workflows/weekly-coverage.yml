name: Weekly Coverage Reports

on:
  schedule:
    # Runs every Monday at 7 AM UTC
    - cron: '0 7 * * 1'
  workflow_dispatch: # allows manual runs

jobs:
  frontend-coverage:
    name: Frontend Coverage
    runs-on: ubuntu-latest
    outputs:
      coverage: ${{ steps.frontend_coverage.outputs.coverage }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'
          cache-dependency-path: ./frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: ./frontend

      - name: Run tests with coverage
        run: npm run test:coverage
        working-directory: ./frontend

      - name: Extract coverage summary
        id: frontend_coverage
        working-directory: frontend
        run: |
          COVERAGE=$(node <<'EOF'
            const fs = require('fs');
            const summaryPath = 'coverage/coverage-summary.json';
            const lcovPath = 'coverage/lcov.info';

            if (fs.existsSync(summaryPath)) {
              const summary = JSON.parse(fs.readFileSync(summaryPath, 'utf8'));
              const linesPct = summary?.total?.lines?.pct;
              if (typeof linesPct === 'number') {
                console.log(String(linesPct));
                process.exit(0);
              }
            }

            if (!fs.existsSync(lcovPath)) {
              console.error('No frontend coverage summary found (coverage-summary.json or lcov.info)');
              process.exit(1);
            }

            const lines = fs.readFileSync(lcovPath, 'utf8').split(/\r?\n/);
            let found = 0;
            let hit = 0;
            for (const line of lines) {
              if (line.startsWith('LF:')) found += Number(line.slice(3)) || 0;
              if (line.startsWith('LH:')) hit += Number(line.slice(3)) || 0;
            }

            if (found <= 0) {
              console.error('Invalid lcov data: no executable lines found');
              process.exit(1);
            }

            console.log(((hit * 100) / found).toFixed(2));
          EOF
          )
          echo "coverage=$COVERAGE" >> $GITHUB_OUTPUT

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: frontend/coverage/

  backend-coverage:
    name: Backend Coverage
    runs-on: ubuntu-latest
    outputs:
      coverage: ${{ steps.backend_coverage.outputs.coverage }}
    services:
      postgres:
        image: postgres:15
        ports:
          - 5432:5432
        env:
          POSTGRES_DB: foodflow_db
          POSTGRES_USER: foodflow_user
          POSTGRES_PASSWORD: foodflow_password
        options: >-
          --health-cmd="pg_isready -U foodflow_user -d foodflow_db"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout backend code
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Run backend tests with coverage
        working-directory: backend
        env:
          SPRING_PROFILES_ACTIVE: test
          DB_HOST: localhost
          DB_PORT: 5432
          DB_NAME: foodflow_db
          DB_USER: foodflow_user
          DB_PASS: foodflow_password
        run: |
          ./mvnw clean verify "-Dspring.profiles.active=test"

      - name: Extract coverage summary
        id: backend_coverage
        working-directory: backend
        run: |
          if [ ! -f target/site/jacoco/jacoco.csv ]; then
            echo "JaCoCo CSV report not found at target/site/jacoco/jacoco.csv"
            exit 1
          fi

          COVERAGE=$(awk -F',' 'NR>1 { missed += $4; covered += $5 } END { total = missed + covered; if (total == 0) { print "0.00" } else { printf "%.2f", (covered * 100) / total } }' target/site/jacoco/jacoco.csv)
          echo "coverage=$COVERAGE" >> $GITHUB_OUTPUT

      - name: Upload backend coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: |
            backend/target/site/jacoco/
            backend/target/surefire-reports/
            backend/target/failsafe-reports/
          if-no-files-found: ignore

  summary:
    name: Coverage Summary
    runs-on: ubuntu-latest
    needs: [frontend-coverage, backend-coverage]
    steps:
      - name: Enforce minimum coverage (80%)
        run: |
          FRONTEND=${{ needs.frontend-coverage.outputs.coverage }}
          BACKEND=${{ needs.backend-coverage.outputs.coverage }}

          echo "Frontend coverage: ${FRONTEND}%"
          echo "Backend coverage: ${BACKEND}%"

          awk -v value="$FRONTEND" 'BEGIN { exit (value >= 80 ? 0 : 1) }' || {
            echo "Frontend coverage is below 80%"
            exit 1
          }

          awk -v value="$BACKEND" 'BEGIN { exit (value >= 80 ? 0 : 1) }' || {
            echo "Backend coverage is below 80%"
            exit 1
          }

      - name: Create coverage summary
        run: |
          echo "## Weekly Coverage Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Frontend Coverage:** ${{ needs.frontend-coverage.outputs.coverage }}%" >> $GITHUB_STEP_SUMMARY
          echo "**Backend Coverage:** ${{ needs.backend-coverage.outputs.coverage }}%" >> $GITHUB_STEP_SUMMARY
